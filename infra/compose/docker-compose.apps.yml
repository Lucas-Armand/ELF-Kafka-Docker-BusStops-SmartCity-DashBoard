services:
  test:
    build:
      context: ../tests
    container_name: test
    depends_on:
      - kafka
    volumes:
      - ../tests:/app/tests
    restart: "no"
    networks:
      - elk

  my-fastapi-app:
    build:
      context: ../../services/my-fastapi-app
    container_name: my-fastapi-app
    # Remap 8000 -> 54322
    ports:
      - '54322:8000'
    depends_on:
      kibana:
        condition: service_healthy
    volumes:
      - ../../services/my-fastapi-app:/app
    networks:
      - elk

  gtfsrt-normalizer:
    build:
      context: ../../services/gtfsrt-normalizer
    container_name: gtfsrt-normalizer
    env_file:
      - ../../services/gtfsrt-normalizer/.env
    depends_on:
      - kafka
    networks:
      - elk
    restart: unless-stopped
